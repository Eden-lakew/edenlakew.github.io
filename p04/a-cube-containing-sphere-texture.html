<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Spinning Mars in Space Cube</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene background="color: #000">

      <!-- Assets -->
      <a-assets>
        <img id="mars" src="./IMAGES/mars-surface.avif" crossorigin="anonymous">
        <img id="stars" src="https://cdn.aframe.io/360-image-gallery-boilerplate/img/starfield.jpg" crossorigin="anonymous">
      </a-assets>

      <!-- Stars as a sky -->
      <a-sky src="#stars" rotation="0 -90 0"></a-sky>

      <!-- Sphere (Mars) with glow -->
      <a-sphere id="marsSphere" 
                radius="0.5"
                position="0 2 -5.5"
                src="#mars"
                material="shader: standard; emissive: #FF4500; emissiveIntensity: 0.2"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
      </a-sphere>

      <!-- Cube Container -->
      <a-box id="cubeContainer" 
             position="0 2 -5.5"
             width="2" height="2" depth="2"
             color="gray"
             transparent="true"
             opacity="0.2"
             animation="property: rotation; to: 360 360 0; loop: true; dur: 20000; easing: linear">
      </a-box>

      <!-- Lighting -->
      <a-light type="ambient" color="#888"></a-light>
      <a-light type="directional" color="#FFF" position="3 4 -2" intensity="1.2"></a-light>

      <!-- Camera -->
      <a-entity camera look-controls position="0 2 3"></a-entity>

    </a-scene>
  </body>
</html>
