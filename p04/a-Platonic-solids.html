<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script> 
  </head>
  <body>
	
    <a-scene>
      <!-- Cube -->
      <a-box position="-4 1 -5" rotation="0 0 0" color="green"
             animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"></a-box>
      
      <!-- Tetrahedron -->
      <a-entity position="-2 1 -5" geometry="primitive: tetrahedron; radius: 1"
                animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"></a-entity>
      
      <!-- Dodecahedron -->
      <a-entity position="0 1 -5" geometry="primitive: dodecahedron; radius: 1"
                animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"></a-entity>
      
      <!-- Octahedron -->
      <a-entity position="2 1 -5" geometry="primitive: octahedron; radius: 1"
                animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"></a-entity>
      
      <!-- Icosahedron -->
      <a-entity position="4 1 -5" geometry="primitive: icosahedron"
                animation="property: rotation; to: 360 360 360; loop: true; dur: 5000; easing: linear"></a-entity>
      
      <!-- Camera -->
      <a-entity camera position="0 2 8"></a-entity>
    </a-scene>

  </body>
</html>
