<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Forest Scene</title>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>

      <!-- Assets -->
      <a-assets>
        <!-- Use your Glitch URL here if uploaded -->
        <img id="forest" src="https://upload.wikimedia.org/wikipedia/commons/7/7d/Rainbow_on_the_Azores_%E2%80%93_360%C2%B0_drone_shot.jpg" crossorigin="anonymous">
      </a-assets>

      <!-- Sky Background -->
      <a-sky src="#forest" rotation="0 -90 0"></a-sky>

      <!-- Geometric Objects -->
      <a-box position="-1 0.5 -3" color="red"></a-box>
      <a-sphere position="1 1.2 -4" radius="1" color="blue"></a-sphere>
      <a-cylinder position="0 0.75 -2" radius="0.4" height="1.5" color="green"></a-cylinder>

      <!-- Text -->
      <a-text
        value="Welcome to My Forest Scene!"
        width="6"
        align="center"
        position="0 2 -3"
        color="#FFFFFF">
      </a-text>

      <!-- Camera -->
      <a-entity camera look-controls position="0 1.6 0"></a-entity>

    </a-scene>
  </body>
</html>
