<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  </head>
  <body>

    <script>
      AFRAME.registerComponent('my-color-toggle', {
        init: function() {
          const el = this.el;

          this.toggleColor = function() {
            // Toggle between original color and orange
            const current = el.getAttribute('color');
            el.setAttribute('color', current === 'orange' ? el.originalColor : 'orange');
            alert("Clicked " + el.getAttribute('id'));
          };

          // Save original color
          el.originalColor = el.getAttribute('color');

          el.addEventListener('click', this.toggleColor);
        },
        remove: function() {
          this.el.removeEventListener('click', this.toggleColor);
        }
      });
    </script>

    <a-scene cursor="rayOrigin: mouse">
      
      <!-- Left Cube (not clickable) -->
      <a-box id="one" position="-2 0 -7" color="red"></a-box>

      <!-- Right Cubes (clickable) -->
      <a-box id="two" position="0 0 -7" color="blue" class="rayclick" my-color-toggle></a-box>
      <a-box id="three" position="2 0 -7" color="green" class="rayclick" my-color-toggle></a-box>


      <!-- Camera -->
      <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>

  </body>
</html>
